<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK STUDY POINT</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.hero img {
  width: 150px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  box-shadow: 0 0 25px #38bdf8;
}

.hero h1 {
  margin-top: 20px;
  font-size: 42px;
}

.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar button {
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  cursor: pointer;
}

.folder {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
}

.file {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
}

a {
  color: #38bdf8;
  text-decoration: none;
}

.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-box input {
  padding: 10px;
  width: 200px;
  border-radius: 5px;
  border: none;
}

.modal-box button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #38bdf8;
}
</style>
</head>

<body>

<div class="hero" id="home">
  <img src="ak.png">
  <h1>AK STUDY POINT</h1>
  <button onclick="enterSite()">Enter</button>
</div>

<div id="dashboard">
  <div class="topbar">
    <h2>📁 Dashboard</h2>
    <button onclick="openLogin()">Admin</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <input type="text" id="folderName" placeholder="Folder Name">
    <button onclick="createFolder()">Create</button>
  </div>

  <div id="folders"></div>
</div>

<div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Admin Login</h3>
    <input type="password" id="password"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
let isAdmin = false;
let data = JSON.parse(localStorage.getItem("ak_data")) || [];

function enterSite(){
  document.getElementById("home").style.display="none";
  document.getElementById("dashboard").style.display="block";
  display();
}

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}

function login(){
  let pass = document.getElementById("password").value;
  if(pass === "ATHARVA@AK47"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginModal").style.display="none";
    display();
  } else {
    alert("Wrong Password");
  }
}

function createFolder(){
  let name = document.getElementById("folderName").value;
  if(!name) return;
  data.push({name:name,files:[]});
  save();
  display();
}

function addFile(i){
  let fname = prompt("File Name:");
  let link = prompt("File Link:");
  if(fname && link){
    data[i].files.push({name:fname,link:link});
    save();
    display();
  }
}

function deleteFolder(i){
  data.splice(i,1);
  save();
  display();
}

function display(){
  let box = document.getElementById("folders");
  box.innerHTML="";

  data.forEach((f,i)=>{
    let div = document.createElement("div");
    div.className="folder";

    let html = `<h3>📁 ${f.name}</h3>`;

    f.files.forEach(file=>{
      html += `<div class="file">
        <span>${file.name}</span>
        <a href="${file.link}" target="_blank">Download</a>
      </div>`;
    });

    if(isAdmin){
      html += `<button onclick="addFile(${i})">➕ File</button>
               <button onclick="deleteFolder(${i})">❌ Delete</button>`;
    }

    div.innerHTML = html;
    box.appendChild(div);
  });
}

function save(){
  localStorage.setItem("ak_data",JSON.stringify(data));
}
</script>

</body>
</html>
